<div class="ds-search-select" [class.ds-search-select--disabled]="isDisabled()">
  @if (label()) {
    <label class="ds-search-select__label" [for]="uniqueId()">
      {{ label() }}
      @if (isRequired()) {
        <span class="ds-search-select__required">*</span>
      }
    </label>
  }
  <div class="ds-search-select__wrapper">
    <input
      class="ds-search-select__input"
      type="text"
      role="combobox"
      [id]="uniqueId()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [attr.aria-expanded]="isOpen"
      aria-haspopup="listbox"
      aria-autocomplete="list"
      [attr.aria-activedescendant]="activeIndex >= 0 ? 'ds-option-' + uniqueId() + '-' + activeIndex : null"
      [(ngModel)]="searchText"
      (input)="onSearchInput()"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (keydown)="onKeyDown($event)"
      autocomplete="off"
    />
    <span class="ds-search-select__arrow" aria-hidden="true"></span>
  </div>
  @if (isOpen && filteredOptions.length) {
    <ul class="ds-search-select__dropdown" role="listbox">
      @for (option of filteredOptions; track option.value; let i = $index) {
        <li
          class="ds-search-select__option"
          [class.ds-search-select__option--active]="i === activeIndex"
          role="option"
          [id]="'ds-option-' + uniqueId() + '-' + i"
          [attr.aria-selected]="i === activeIndex"
          (mousedown)="selectOption(option)"
        >
          {{ option.label }}
        </li>
      }
    </ul>
  }
</div>
