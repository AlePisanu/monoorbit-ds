<div class="ds-input" [class.ds-input--error]="isError()" [class.ds-input--disabled]="isDisabled()">
  @if (isLabelVisible() && label()) {
    <label class="ds-input__label" [for]="uniqueId()">
      {{ label() }}
      @if (isRequired()) {
        <span class="ds-input__required">*</span>
      }
      @if (tooltip()) {
        <span class="ds-input__tooltip" [title]="tooltip()">?</span>
      }
    </label>
  }

  <div class="ds-input__wrapper">
    @if (isTextArea()) {
      <textarea
        class="ds-input__field ds-input__field--textarea"
        [id]="uniqueId()"
        [placeholder]="placeholder()"
        [disabled]="isDisabled()"
        [readonly]="isReadOnly()"
        [rows]="textAreaRows()"
        [value]="value"
        (input)="onInput($event)"
        (blur)="onBlur()"
      ></textarea>
    } @else {
      <input
        class="ds-input__field"
        [type]="currentInputType"
        [id]="uniqueId()"
        [placeholder]="placeholder()"
        [disabled]="isDisabled()"
        [readonly]="isReadOnly()"
        [maxLength]="maxLength()"
        [value]="value"
        (input)="onInput($event)"
        (blur)="onBlur()"
      />
    }

    @if (isPassword) {
      <button
        type="button"
        class="ds-input__toggle-password"
        (click)="togglePassword()"
        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
        [attr.aria-pressed]="showPassword"
      >{{ showPassword ? 'Hide' : 'Show' }}</button>
    }

    @if (showTick() && !isError()) {
      <span class="ds-input__tick">&#10003;</span>
    }
  </div>

  @if (isError() && labelError()) {
    <span class="ds-input__error-msg">{{ labelError() }}</span>
  }

  @if (helper()) {
    <span class="ds-input__helper">
      <a (click)="helperAction.emit()">{{ helper() }}</a>
    </span>
  }
</div>
