@if (isOpen()) {
  <div class="ds-modal" role="dialog" aria-modal="true"
       [attr.aria-labelledby]="title() ? 'ds-modal-title' : null"
       (keydown)="onKeyDown($event)">
    <div class="ds-modal__overlay" (click)="onOverlayClick()" aria-hidden="true"></div>
    <div class="ds-modal__dialog" #dialogEl [ngClass]="'ds-modal__dialog--' + size()">

      @if (showHeader()) {
        <div class="ds-modal__header">
          @if (title()) {
            <h3 class="ds-modal__title" id="ds-modal-title">{{ title() }}</h3>
          }
          <ng-content select="[modal-header]"></ng-content>
          <button class="ds-modal__close" type="button" (click)="close()" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      }

      <div class="ds-modal__body">
        <ng-content></ng-content>
      </div>

      @if (showFooter()) {
        <div class="ds-modal__footer">
          <ng-content select="[modal-footer]"></ng-content>
        </div>
      }

    </div>
  </div>
}
