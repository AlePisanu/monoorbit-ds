<div
  class="ds-drag-drop"
  [class.ds-drag-drop--dragging]="isDragging"
  [class.ds-drag-drop--disabled]="isDisabled()"
  [class.ds-drag-drop--has-file]="file"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  @if (!file) {
    <div class="ds-drag-drop__zone">
      <p class="ds-drag-drop__text">{{ title() }}</p>
      <p class="ds-drag-drop__hint">Max {{ maxSizeMb() }}MB</p>
      <input
        type="file"
        class="ds-drag-drop__input"
        [accept]="accept()"
        [disabled]="isDisabled()"
        (change)="onFileInput($event)"
        aria-label="Upload file"
      />
    </div>
  }

  @if (file) {
    <div class="ds-drag-drop__file">
      <div class="ds-drag-drop__file-info">
        <span class="ds-drag-drop__file-name">{{ file.name }}</span>
        <span class="ds-drag-drop__file-size">{{ file.size }}</span>
      </div>
      <button class="ds-drag-drop__remove" type="button" (click)="removeFile()"
              [attr.aria-label]="'Remove file ' + file.name">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
  }

  @if (error) {
    <p class="ds-drag-drop__error">{{ error }}</p>
  }
</div>
